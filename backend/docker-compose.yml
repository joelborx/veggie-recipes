version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: veggie-recipes-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: veggie_dev_password
      MONGO_INITDB_DATABASE: veggie_recipes
    volumes:
      - mongodb_data:/data/db
    networks:
      - veggie-network

  # Optional: MongoDB Express for web-based DB management
  mongo-express:
    image: mongo-express:1.0.2
    container_name: veggie-recipes-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: veggie_dev_password
      ME_CONFIG_MONGODB_URL: mongodb://admin:veggie_dev_password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: veggie_dev_password
    depends_on:
      - mongodb
    networks:
      - veggie-network

volumes:
  mongodb_data:
    driver: local

networks:
  veggie-network:
    driver: bridge