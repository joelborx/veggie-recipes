<!-- Recipe Card Component -->
<div class="recipe-card" id="recipeCard">
    <div class="recipe-image" id="recipeImage">
        <div class="recipe-placeholder">🍽️</div>
    </div>
    
    <div class="recipe-content">
        <div class="recipe-header">
            <h2 class="recipe-title" id="recipeTitle"></h2>
            <div class="recipe-rating" id="recipeRating">
                <span class="stars">⭐⭐⭐⭐⭐</span>
                <span class="rating-count">(42)</span>
            </div>
        </div>
        
        <p class="recipe-description" id="recipeDesc"></p>
        
        <div class="recipe-tags" id="recipeTags"></div>
        
        <div class="recipe-meta">
            <div class="meta-item">
                <span class="meta-icon">🔥</span>

                <span class="meta-label">kcal</span>
            </div>
            
            <div class="meta-item">
                <span class="meta-icon">⏱️</span>
                <span class="meta-value" id="recipeTime"></span>
                <span class="meta-label">Min</span>
            </div>
            
            <div class="meta-item">
                <span class="meta-icon">🍳</span>
                <span class="meta-value" id="recipeDifficulty">Mittel</span>
            </div>
        </div>
        
        <div class="recipe-actions">
            <button class="btn-view" onclick="viewRecipeDetails()">
                <span>👁️ Details</span>
            </button>
            
            <button class="btn-share" onclick="shareRecipe()">
                <span>📤 Teilen</span>
            </button>
        </div>
    </div>
</div>
